description = "Package and deploy the current Rocket.Chat App"

prompt = """
The user wants to package/deploy their RC App:

{{args}}

Steps:
1. Find the project root — look for app.json in the current directory or parent directories.
2. Call rc-apps package to build the .zip.
3. If packaging succeeds, tell the user:

   "✅ App packaged successfully!

   To upload your app:
   1. Open your Rocket.Chat Admin Panel
   2. Go to **Marketplace → Private Apps** (http://localhost:3000/marketplace/private/list — adjust the host/port to your server)
   3. Click **Upload Private App**
   4. Select the generated .zip file
   5. Click **Install**

   Or deploy via CLI:
   `rc-apps deploy --url <server-url> --username <admin-user> --password <password>`"

4. If packaging fails, read the error output, fix the broken code, and retry rc_package_app. Repeat until it passes.
"""
